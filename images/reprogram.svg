<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <rect width="800" height="600" fill="#f8fafc"/>
  <rect width="800" height="70" fill="#0c4a6e"/>
  <text x="34" y="45" font-size="26" font-weight="800" fill="#e0f2fe">후성유전 재프로그래밍 사이클</text>
  <text x="770" y="44" text-anchor="end" font-size="13" font-weight="700" fill="#7dd3fc">Yamanaka OSKM</text>

  <!-- cycle arrows -->
  <g fill="none" stroke="#0369a1" stroke-width="3">
    <path d="M300 180 A 150 130 0 0 1 500 180" marker-end="url(#ar)"/>
    <path d="M540 230 A 150 130 0 0 1 500 420" marker-end="url(#ar)"/>
    <path d="M470 450 A 150 130 0 0 1 300 420" marker-end="url(#ar)"/>
    <path d="M260 400 A 150 130 0 0 1 300 200" marker-end="url(#ar)"/>
  </g>
  <defs><marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 z" fill="#0369a1"/></marker></defs>

  <!-- aged cell -->
  <g transform="translate(230,170)">
    <circle r="52" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
    <circle r="20" fill="#fca5a5"/>
    <g stroke="#b91c1c" stroke-width="3"><line x1="-30" y1="-30" x2="-18" y2="-18"/><line x1="28" y1="-24" x2="16" y2="-14"/><line x1="24" y1="28" x2="14" y2="16"/></g>
    <text x="0" y="80" text-anchor="middle" font-size="15" font-weight="800" fill="#b91c1c">노화 세포</text>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#7f1d1d">메틸화 축적 · 기능 저하</text>
  </g>

  <!-- rejuvenated cell -->
  <g transform="translate(570,170)">
    <circle r="52" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <circle r="20" fill="#60a5fa"/>
    <g fill="#1d4ed8"><circle cx="-28" cy="-24" r="5"/><circle cx="30" cy="-20" r="5"/><circle cx="22" cy="28" r="5"/></g>
    <text x="0" y="80" text-anchor="middle" font-size="15" font-weight="800" fill="#1d4ed8">젊은 세포</text>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#1e3a8a">나이 정보 초기화</text>
  </g>

  <!-- reprogramming factor box (center bottom) -->
  <g transform="translate(300,340)">
    <rect width="200" height="120" rx="16" fill="#0c4a6e"/>
    <text x="100" y="42" text-anchor="middle" font-size="16" font-weight="800" fill="#e0f2fe">OSKM 인자</text>
    <text x="100" y="68" text-anchor="middle" font-size="12" fill="#7dd3fc">Oct4·Sox2·Klf4·Myc</text>
    <text x="100" y="98" text-anchor="middle" font-size="12" fill="#bae6fd">후성유전 시계 리셋</text>
  </g>

  <text x="400" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#0369a1">부분 재프로그래밍 (partial reprogramming)</text>
  <text x="34" y="575" font-size="13" font-weight="700" fill="#0369a1">RE:AGE INSIGHT · 노벨상 야마나카 인자 기반 차세대 노화 역전</text>
</svg>
