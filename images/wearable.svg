<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="wNavy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1b3a"/><stop offset="0.6" stop-color="#132a52"/><stop offset="1" stop-color="#1e3a6b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#wNavy)"/>
  <g fill="#1c356b" opacity="0.5"><rect x="0" y="0" width="800" height="2"/></g>
  <text x="40" y="70" font-size="15" font-weight="700" fill="#93c5fd">영상 AI 고령자 건강 관리 시스템</text>
  <text x="40" y="130" font-size="48" font-weight="800" fill="#ffffff">간편한</text>
  <text x="40" y="188" font-size="48" font-weight="800" fill="#ffffff">건강 모니터링</text>
  <text x="40" y="228" font-size="15" fill="#7da8e0">Musculoskeletal condition</text>
  <text x="40" y="250" font-size="15" fill="#7da8e0">monitoring solution</text>

  <!-- walking senior silhouette -->
  <g transform="translate(600,300)" fill="#2a4d8f" opacity="0.9">
    <circle cx="40" cy="20" r="20"/>
    <path d="M40 42 L34 120 L20 200 M40 120 L58 195" stroke="#2a4d8f" stroke-width="20" stroke-linecap="round" fill="none"/>
    <path d="M40 60 L14 110 M40 60 L70 100" stroke="#2a4d8f" stroke-width="16" stroke-linecap="round" fill="none"/>
  </g>

  <!-- phone with gait skeleton -->
  <g transform="translate(300,300)">
    <rect x="0" y="0" width="150" height="270" rx="24" fill="#0a1428" stroke="#3b82f6" stroke-width="3"/>
    <rect x="14" y="26" width="122" height="220" rx="10" fill="#101f3d"/>
    <text x="75" y="46" text-anchor="middle" font-size="9" fill="#7dd3fc">AI 보행 분석</text>
    <!-- skeleton figure -->
    <g stroke="#22d3ee" stroke-width="3" fill="#22d3ee">
      <circle cx="75" cy="80" r="9" fill="#22d3ee"/>
      <line x1="75" y1="89" x2="75" y2="150"/>
      <line x1="75" y1="100" x2="52" y2="130"/><line x1="75" y1="100" x2="98" y2="128"/>
      <line x1="75" y1="150" x2="58" y2="200"/><line x1="75" y1="150" x2="94" y2="196"/>
      <circle cx="52" cy="130" r="4"/><circle cx="98" cy="128" r="4"/>
      <circle cx="58" cy="200" r="4"/><circle cx="94" cy="196" r="4"/>
    </g>
    <rect x="30" y="216" width="90" height="20" rx="6" fill="#1e3a6b"/>
    <text x="75" y="230" text-anchor="middle" font-size="9" fill="#93c5fd">정상 보행 · 92점</text>
  </g>

  <text x="40" y="575" font-size="13" font-weight="700" fill="#60a5fa">RE:AGE INSIGHT · 스마트폰 카메라로 근골격·보행 나이 측정</text>
</svg>
