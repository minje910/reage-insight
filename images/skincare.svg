<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="skDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#skDark)"/>
  <!-- news title band -->
  <rect x="70" y="60" width="660" height="120" rx="10" fill="rgba(0,0,0,0.35)"/>
  <text x="400" y="112" text-anchor="middle" font-size="30" font-weight="800" fill="#f472b6">손상된 피부·힘줄 빠르게</text>
  <text x="400" y="152" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff">재생시키는 첨단 소재</text>

  <!-- graphene hex lattice -->
  <g transform="translate(230,230)" stroke="#f9a8d4" stroke-width="3" fill="none" opacity="0.9">
    <polygon points="0,20 18,10 36,20 36,40 18,50 0,40"/>
    <polygon points="36,20 54,10 72,20 72,40 54,50 36,40"/>
    <polygon points="72,20 90,10 108,20 108,40 90,50 72,40"/>
    <polygon points="18,50 36,40 54,50 54,70 36,80 18,70"/>
    <polygon points="54,50 72,40 90,50 90,70 72,80 54,70"/>
    <polygon points="18,-10 36,-20 54,-10 54,10 36,20 18,10"/>
    <polygon points="54,-10 72,-20 90,-10 90,10 72,20 54,10"/>
  </g>
  <text x="285" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#f9a8d4">그래핀 격자</text>

  <!-- hydrogel droplet -->
  <g transform="translate(470,220)">
    <path d="M60 0 C 110 70 130 110 90 160 C 55 200 0 185 -10 130 C -18 85 20 55 60 0 Z" fill="rgba(244,114,182,0.25)" stroke="#f472b6" stroke-width="3"/>
    <ellipse cx="35" cy="70" rx="18" ry="10" fill="#fbcfe8" opacity="0.6"/>
    <text x="55" y="130" text-anchor="middle" font-size="14" font-weight="800" fill="#fce7f3">터프 하이드로겔</text>
  </g>

  <!-- skin layers regen -->
  <g transform="translate(150,430)">
    <rect x="0" y="0" width="500" height="14" rx="4" fill="#f9a8d4"/>
    <rect x="0" y="20" width="500" height="14" rx="4" fill="#ec4899" opacity="0.7"/>
    <rect x="0" y="40" width="500" height="14" rx="4" fill="#be185d" opacity="0.7"/>
    <text x="510" y="30" font-size="12" fill="#fbcfe8">재생 ↑</text>
  </g>
  <text x="70" y="575" font-size="13" font-weight="700" fill="#f472b6">RE:AGE INSIGHT · 콜라겐·엑소좀 기반 첨단 피부재생 케어</text>
</svg>
