    <text x="470" y="60" font-size="13" font-weight="800" fill="#5eead4">최적화 유지</text>
    <text x="10" y="30" font-size="11" fill="#fbcfe8">호르몬 수치</text>
    <text x="560" y="255" font-size="11" fill="#fbcfe8">나이 →</text>
    <!-- hormone icons -->
    <g fill="#fbcfe8" font-size="11" text-anchor="middle">
      <circle cx="120" cy="130" r="18" fill="rgba(255,255,255,0.12)" stroke="#f9a8d4" stroke-width="2"/><text x="120" y="134">T</text>
      <circle cx="330" cy="130" r="18" fill="rgba(255,255,255,0.12)" stroke="#f9a8d4" stroke-width="2"/><text x="330" y="134">E</text>
      <circle cx="520" cy="130" r="18" fill="rgba(255,255,255,0.12)" stroke="#f9a8d4" stroke-width="2"/><text x="520" y="134">GH</text>
