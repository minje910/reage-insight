<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="hoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a1233"/><stop offset="1" stop-color="#831843"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#hoBg)"/>
  <text x="40" y="72" font-size="15" font-weight="700" fill="#f9a8d4" letter-spacing="2">HORMONE OPTIMIZATION</text>
