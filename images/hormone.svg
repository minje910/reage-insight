    <path d="M20 40 C 200 60 400 180 620 210" fill="none" stroke="#be6a97" stroke-width="4" stroke-dasharray="8 6"/>
    <text x="470" y="200" font-size="12" fill="#e5a9c8">자연 감소</text>
    <!-- optimized -->
