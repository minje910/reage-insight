    <line x1="0" y1="0" x2="0" y2="230" stroke="#c084a8" stroke-width="2"/>
    <line x1="0" y1="230" x2="640" y2="230" stroke="#c084a8" stroke-width="2"/>
    <text x="-10" y="0" text-anchor="end" font-size="11" fill="#fbcfe8" transform="rotate(-90,-10,0)"></text>
