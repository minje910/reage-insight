      <stop offset="0" stop-color="#0b1b3a"/><stop offset="1" stop-color="#15294f"/>
    </linearGradient>
    <linearGradient id="cGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/><stop offset="1" stop-color="#d4a017"/>
