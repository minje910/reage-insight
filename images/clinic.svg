  </defs>
  <rect width="800" height="600" fill="url(#cvNavy)"/>
  <text x="40" y="72" font-size="15" font-weight="700" fill="#fcd34d" letter-spacing="2">PREMIUM LONGEVITY CLINIC · VIP</text>
