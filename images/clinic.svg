    <rect x="15" y="60" width="170" height="150" fill="#1b3157" stroke="url(#cGold)" stroke-width="3"/>
    <g fill="url(#cGold)"><rect x="85" y="90" width="30" height="90"/><rect x="70" y="120" width="60" height="30"/></g>
    <g fill="#0b1b3a"><rect x="30" y="90" width="24" height="30"/><rect x="146" y="90" width="24" height="30"/><rect x="30" y="140" width="24" height="30"/><rect x="146" y="140" width="24" height="30"/></g>
  </g>

  <!-- biomarker dashboard -->
