<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="nmnMito" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a7d18a"/><stop offset="1" stop-color="#6ea54a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#f4f8ee"/>
  <rect width="800" height="70" fill="#3f6212"/>
  <text x="34" y="45" font-size="27" font-weight="800" fill="#ecfccb">ATP는 이렇게 만들어집니다</text>
  <text x="770" y="44" text-anchor="end" font-size="13" font-weight="700" fill="#bef264">NAD+ · NMN</text>

  <!-- Glucose -->
  <g>
    <text x="70" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#4d7c0f">Glucose</text>
    <g fill="#84cc16"><circle cx="45" cy="175" r="9"/><circle cx="70" cy="170" r="9"/><circle cx="95" cy="175" r="9"/><circle cx="58" cy="195" r="9"/><circle cx="83" cy="195" r="9"/></g>
  </g>
  <text x="185" y="185" font-size="30" fill="#65a30d">→</text>
  <text x="185" y="210" font-size="12" fill="#65a30d">11 steps</text>

  <!-- Mitochondrion -->
  <g transform="translate(260,120)">
    <rect x="0" y="0" width="300" height="200" rx="100" fill="url(#nmnMito)" stroke="#4d7c0f" stroke-width="3"/>
    <path d="M20 40 q60 -20 120 20 q60 40 140 10" fill="none" stroke="#ecfccb" stroke-width="6" opacity="0.6"/>
    <path d="M20 120 q60 40 120 0 q60 -40 140 20" fill="none" stroke="#ecfccb" stroke-width="6" opacity="0.6"/>
    <circle cx="120" cy="100" r="52" fill="#eaf7d5" stroke="#4d7c0f" stroke-width="3"/>
    <text x="120" y="96" text-anchor="middle" font-size="13" font-weight="800" fill="#3f6212">TCA</text>
    <text x="120" y="114" text-anchor="middle" font-size="13" font-weight="800" fill="#3f6212">cycle</text>
    <rect x="200" y="70" width="70" height="60" rx="10" fill="#3f6212"/>
    <text x="235" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#ecfccb">Electron</text>
    <text x="235" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="#ecfccb">transport</text>
    <text x="150" y="235" text-anchor="middle" font-size="14" font-style="italic" fill="#4d7c0f">Mitochondria</text>
  </g>
  <text x="585" y="215" font-size="30" fill="#65a30d">→</text>

  <!-- ATP -->
  <g transform="translate(640,150)">
    <g fill="#4d7c0f"><rect x="0" y="30" width="14" height="40"/><rect x="20" y="10" width="14" height="60"/><rect x="40" y="24" width="14" height="46"/><rect x="60" y="0" width="14" height="70"/></g>
    <text x="37" y="100" text-anchor="middle" font-size="20" font-weight="800" fill="#3f6212">ATP</text>
  </g>

  <!-- NAD+ callout -->
  <g transform="translate(0,360)">
    <rect x="34" y="0" width="732" height="170" rx="18" fill="#ffffff" stroke="#d9f99d" stroke-width="2"/>
    <circle cx="110" cy="85" r="46" fill="#ecfccb" stroke="#65a30d" stroke-width="3"/>
    <text x="110" y="80" text-anchor="middle" font-size="18" font-weight="800" fill="#3f6212">NAD+</text>
    <text x="110" y="102" text-anchor="middle" font-size="11" fill="#4d7c0f">보조효소</text>
    <text x="185" y="55" font-size="20" font-weight="800" fill="#1a2e05">NAD+가 부족하면 → 활력·생기 없는 세포</text>
    <text x="185" y="90" font-size="14" fill="#3f6212">· ATP 생산은 NAD+에 의존 — 나이 들수록 NAD+는 급감합니다</text>
    <text x="185" y="118" font-size="14" fill="#3f6212">· NMN 보충으로 NAD+를 채워 세포 에너지·재생력을 회복</text>
    <text x="185" y="146" font-size="13" font-weight="700" fill="#65a30d">RE:AGE INSIGHT · 세포 에너지 부스팅</text>
  </g>
</svg>
