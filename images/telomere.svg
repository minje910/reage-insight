<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="teBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b0764"/><stop offset="1" stop-color="#6b21a8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#teBg)"/>
  <text x="40" y="72" font-size="15" font-weight="700" fill="#d8b4fe" letter-spacing="2">TELOMERE</text>
  <text x="40" y="128" font-size="44" font-weight="800" fill="#ffffff">텔로미어 관리</text>
  <text x="40" y="162" font-size="16" fill="#e9d5ff">세포시계의 태엽을 되감다</text>

  <!-- chromosome with caps: young vs old -->
  <g transform="translate(80,250)">
    <text x="0" y="-10" font-size="14" font-weight="800" fill="#fbcfe8">젊은 세포</text>
    <g>
      <rect x="0" y="20" width="240" height="34" rx="17" fill="#c084fc"/>
      <rect x="0" y="20" width="55" height="34" rx="17" fill="#5eead4"/>
      <rect x="185" y="20" width="55" height="34" rx="17" fill="#5eead4"/>
      <text x="27" y="80" text-anchor="middle" font-size="11" fill="#a7f3d0">긴 텔로미어</text>
    </g>
  </g>
  <g transform="translate(80,370)">
    <text x="0" y="-10" font-size="14" font-weight="800" fill="#fda4af">노화 세포</text>
    <g>
      <rect x="0" y="20" width="240" height="34" rx="17" fill="#c084fc"/>
      <rect x="0" y="20" width="22" height="34" rx="11" fill="#f472b6"/>
      <rect x="218" y="20" width="22" height="34" rx="11" fill="#f472b6"/>
      <text x="12" y="80" text-anchor="middle" font-size="11" fill="#fbcfe8">짧아진 텔로미어</text>
    </g>
  </g>

  <!-- length gauge -->
  <g transform="translate(430,250)">
    <rect width="300" height="230" rx="16" fill="rgba(0,0,0,0.25)" stroke="#8b5cf6" stroke-width="2"/>
    <text x="150" y="36" text-anchor="middle" font-size="15" font-weight="800" fill="#e9d5ff">텔로미어 길이 측정</text>
    <g transform="translate(40,70)">
      <text font-size="12" fill="#ddd6fe">내 세포 나이</text>
      <text x="220" y="0" text-anchor="end" font-size="16" font-weight="800" fill="#5eead4">-4.5세 ▼</text>
      <rect y="14" width="220" height="14" rx="7" fill="#4c1d95"/>
      <rect y="14" width="150" height="14" rx="7" fill="#5eead4"/>
      <text y="70" font-size="12" fill="#ddd6fe">텔로머라제 활성</text>
      <rect y="84" width="220" height="14" rx="7" fill="#4c1d95"/>
      <rect y="84" width="170" height="14" rx="7" fill="#c084fc"/>
      <text y="140" font-size="11" fill="#c4b5fd">연 2회 추적 · 개선 곡선 확인</text>
    </g>
  </g>
  <text x="40" y="575" font-size="13" font-weight="700" fill="#d8b4fe">RE:AGE INSIGHT · 염색체 끝 텔로미어로 보는 세포 노화도</text>
</svg>
